version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: clinical
      POSTGRES_PASSWORD: Damn13258
      POSTGRES_DB: clinical_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical -d clinical_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URI: postgresql+asyncpg://clinical:Damn13258@db:5432/clinical_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMAIL_SENDER: edward1325811540@gmail.com
      EMAIL_PASSWORD: "mgoz vyzu xljp atgr"
      EMAIL_SMTP_SERVER: smtp.gmail.com
      EMAIL_SMTP_PORT: 587
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: